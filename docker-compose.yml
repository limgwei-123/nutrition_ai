services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: nutrition
      POSTGRES_DB: nutrition_ai
    ports:
      - "5432:5432"
    volumes:
      - nutrition_ai_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition -d nutrition_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://nutrition:nutrition@db:5432/nutrition_ai
      AI_PROVIDER: mock
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  nutrition_ai_db:
